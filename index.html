<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Você Não Está Sozinha 💛</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== FAIXA SABRINA ===== */
    .top-banner {
      width: 100%;
      background: linear-gradient(90deg, #FFD700, #FFF3A0, #FFD700);
      color: #333;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 12px 0;
      text-align: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      letter-spacing: 1px;
      overflow: hidden;
    }

    .top-banner::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
      animation: brilho 3s infinite;
    }

    @keyframes brilho {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    .top-banner span {
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .container {
      margin-top: 70px;
      max-width: 800px;
      margin: 70px auto 0;
      position: relative;
      z-index: 1;
    }

    header {
      animation: slideDown 0.8s ease-out;
      margin-bottom: 30px;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      color: #1e5a96;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(30, 90, 150, 0.1);
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #2a7ab8;
      font-weight: 500;
      margin-bottom: 20px;
      animation: fadeIn 1s ease-out 0.3s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ===== CARROSSEL MELHORADO ===== */
    .carousel-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 30px auto;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      background: white;
    }

    .carousel {
      display: flex;
      transition: transform 0.6s ease-in-out;
    }

    .carousel-slide {
      min-width: 100%;
      opacity: 0;
      transition: opacity 0.5s ease;
      position: absolute;
    }

    .carousel-slide.active {
      opacity: 1;
      position: relative;
    }

    .carousel-slide img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      border-radius: 20px;
    }

    /* overlay suave */
    .carousel-slide::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
      border-radius: 20px;
    }

    /* setas */
    .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.8);
      border: none;
      font-size: 24px;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.3s;
    }

    .carousel-nav:hover {
      background: #fff;
      transform: translateY(-50%) scale(1.1);
    }

    .prev { left: 10px; }
    .next { right: 10px; }

    /* dots */
    .carousel-controls {
      position: absolute;
      bottom: 10px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .carousel-dot {
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      cursor: pointer;
      transition: 0.3s;
    }

    .carousel-dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* ===== BOTÕES MELHORADOS ===== */
    .buttons-container {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    button {
      border: none;
      padding: 14px 22px;
      font-size: 1rem;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    .btn-mensagem {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #333;
    }

    .btn-fogos {
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      color: #333;
    }

    button:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    #mensagem {
      margin-top: 15px;
      font-size: 1.2rem;
      color: #1e5a96;
      font-weight: bold;
      min-height: 30px;
    }

    .firework {
      position: fixed;
      font-size: 24px;
      animation: explode 1s ease-out forwards;
      pointer-events: none;
    }

    @keyframes explode {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }

  </style>
</head>

<body>

<div class="top-banner">
  <span>Sabrina ✨</span>
</div>

<div class="container">
  <header>
    <h1>Você é Mais Forte do Que Imagina 💖</h1>
    <p class="subtitle">Você não está sozinha nessa jornada</p>

  <!-- Carrossel -->

      <div class="carousel-slide">
        <img src="WhatsApp Image 2026-02-25 at 18.57.39.jpeg">
      </div>
      <div class="carousel-slide">
        <img src="WhatsApp Image 2026-02-25 at 18.58.12.jpeg">
      </div>

      <div class="carousel-slide">
        <img src="IMG-20260322-WA0030.jpg">
      </div>

      
      <div class="carousel-slide">
        <img src="IMG-20260322-WA0031.jpg">

      <div class="carousel-slide">
        <img src="IMG-20260322-WA0032.jpg">
      </div>

      <div class="carousel-slide">
        <img src="IMG-20260322-WA0034.jpg">
      </div>

      <div class="carousel-slide">
        <img src="IMG-20260322-WA0035.jpg">
      </div>

      
     <div class="carousel-slide">
        <img src="IMG-20260322-WA0036.jpg">
      </div>

      <div class="carousel-slide">
        <img src="IMG-20260322-WA0037.jpg">
      </div>

      <div class="carousel-slide">
        <img src="IMG-20260322-WA0038.jpg">
      </div>

      
<div class="carousel-slide">
        <img src="IMG-20260322-WA0043.jpg">
      </div>



      

      
    </div>

    <button class="carousel-nav prev" onclick="prevSlide()">❮</button>
    <button class="carousel-nav next" onclick="nextSlide()">❯</button>

    <div class="carousel-controls">
      <div class="carousel-dot active" onclick="goToSlide(0)"></div>
<div class="carousel-dot" onclick="goToSlide(1)"></div>
<div class="carousel-dot" onclick="goToSlide(2)"></div>
<div class="carousel-dot" onclick="goToSlide(3)"></div>
<div class="carousel-dot" onclick="goToSlide(4)"></div>
<div class="carousel-dot" onclick="goToSlide(5)"></div>
<div class="carousel-dot" onclick="goToSlide(6)"></div>
  </div>
  </div>

  <div class="buttons-container">
    <button class="btn-mensagem" onclick="mostrarMensagem()">💌 Clique para uma mensagem especial</button>
    <button class="btn-fogos" onclick="criarFogos()">🎆 Solte Fogos de Alegria!</button>
  </div>

  <div id="mensagem"></div>
</div>

<script>
function mostrarMensagem() {
  const mensagens = [
    "Você é importante 💛",
    "Você é incrível 💕",
    "Tudo vai ficar bem 🌷",
    "Você é mais forte do que imagina 💪✨",
    "Seu sorriso ilumina o mundo 😊",
    "Dias difíceis também passam 🌈",
    "Você merece coisas lindas 💖",
    "Nunca esqueça o quanto você é especial 🌟",
    "Você é suficiente exatamente como é 💛",
    "Existe muita luz dentro de você ✨",
    "Você já venceu até aqui, continue 💪",
    "O mundo é melhor com você nele 🌍💖",
    "Você é capaz de coisas incríveis 🚀",
    "Permita-se descansar, você merece 🌙",
    "Você não está sozinha, nunca 🤝",
    "Tudo tem seu tempo, confie 🌱",
    "Seu coração é cheio de coisas boas 💕",
    "Você é um presente na vida de alguém 🎁",
    "Acredite em você, sempre 💫",
    "Você é mais corajosa do que pensa 🦋",
    "Coisas boas estão chegando 🌸",
    "Respire… vai ficar tudo bem 🌿",
    "Você merece paz e felicidade 🕊️",
    "Cada pequeno passo já é uma vitória 👣",
    "Você é luz, mesmo nos dias nublados ☀️",
    "Nunca duvide do seu valor 💎",
    "Você tem um coração lindo 💖",
    "Você inspira mais do que imagina 🌟"
  ];

  const msg = mensagens[Math.floor(Math.random()*mensagens.length)];
  document.getElementById("mensagem").textContent = msg;
}

function criarFogos() {
  const emojis = ['🎆','✨','🎇'];
  for (let i=0;i<20;i++){
    setTimeout(()=>{
      const f=document.createElement('div');
      f.className='firework';
      f.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      f.style.left=Math.random()*window.innerWidth+'px';
      f.style.top=Math.random()*window.innerHeight+'px';
      document.body.appendChild(f);
      setTimeout(()=>f.remove(),1000);
    },i*50);
  }
}

let currentSlide=0;
const slides=document.querySelectorAll('.carousel-slide');
const dots=document.querySelectorAll('.carousel-dot');

function showSlide(n){
  slides.forEach(s=>s.classList.remove('active'));
  dots.forEach(d=>d.classList.remove('active'));
  slides[n].classList.add('active');
  dots[n].classList.add('active');
}

function nextSlide(){currentSlide=(currentSlide+1)%slides.length;showSlide(currentSlide);}
function prevSlide(){currentSlide=(currentSlide-1+slides.length)%slides.length;showSlide(currentSlide);}
function goToSlide(n){currentSlide=n;showSlide(n);}

setInterval(nextSlide,5000);
</script>

</body>
</html>

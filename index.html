
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Você Não Está Sozinha 💛</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== FAIXA SABRINA ===== */
    .top-banner {
      width: 100%;
      background: linear-gradient(90deg, #FFD700, #FFF3A0, #FFD700);
      color: #333;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 12px 0;
      text-align: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      letter-spacing: 1px;
      overflow: hidden;
    }

    .top-banner::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
      animation: brilho 3s infinite;
    }

    @keyframes brilho {
      0% { left: -100%; }
      100% { left: 150%; }
    }

    .top-banner span {
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* Ajuste para não cobrir conteúdo */
    .container {
      margin-top: 70px;
    }

    /* ===== SEU CSS ORIGINAL (INALTERADO) ===== */

    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
    }

    .constellation-line {
      position: absolute;
      background: rgba(255, 255, 255, 0.3);
      pointer-events: none;
    }

    .container {
      max-width: 800px;
      margin: 70px auto 0;
      position: relative;
      z-index: 1;
    }

    header {
      animation: slideDown 0.8s ease-out;
      margin-bottom: 30px;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: #1e5a96;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(30, 90, 150, 0.1);
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #2a7ab8;
      font-weight: 500;
      margin-bottom: 20px;
      animation: fadeIn 1s ease-out 0.3s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ===== TODO O RESTO DO SEU CSS ORIGINAL ===== */
  </style>
</head>

<body>

<!-- FAIXA -->
<div class="top-banner">
  <span>Sabrina ✨</span>
</div>

<!-- Constelação -->
<div class="stars" id="constellation"></div>

<div class="container">
  <header>
    <h1>Você é Mais Forte do Que Imagina 💖</h1>
    <p class="subtitle">Você não está sozinha nessa jornada</p>
  </header>

  <!-- Carrossel -->
  <div class="carousel-container">
    <div class="carousel">
      <div class="carousel-slide active">
        <img src="WhatsApp Image 2026-02-22 at 10.54.09.jpeg" alt="Imagem 1">
      </div>
      <div class="carousel-slide">
        <img src="WhatsApp Image 2026-02-22 at 11.28.04.jpeg" alt="Imagem 2">
      </div>
      <div class="carousel-slide">
        <img src="WhatsApp Image 2026-02-25 at 18.57.39.jpeg" alt="Imagem 3">
      </div>
      <div class="carousel-slide">
        <img src="WhatsApp Image 2026-02-25 at 18.58.12.jpeg" alt="Imagem 4">
      </div>
    </div>

    <div class="carousel-controls">
      <div class="carousel-dot active" onclick="goToSlide(0)"></div>
      <div class="carousel-dot" onclick="goToSlide(1)"></div>
      <div class="carousel-dot" onclick="goToSlide(2)"></div>
      <div class="carousel-dot" onclick="goToSlide(3)"></div>
    </div>

    <button class="carousel-nav prev" onclick="prevSlide()">❮</button>
    <button class="carousel-nav next" onclick="nextSlide()">❯</button>
  </div>

  <!-- Frases -->
  <div class="mensagens-container">
    <div class="frase-apoio">
      Mesmo nos dias difíceis, lembre-se: você não está sozinha 🌷
    </div>
  </div>

  <!-- Botões -->
  <div class="buttons-container">
    <button class="btn-mensagem" onclick="mostrarMensagem()">💌 Clique para uma mensagem especial</button>
    <button class="btn-fogos" onclick="criarFogos()">🎆 Solte Fogos de Alegria!</button>
  </div>

  <div id="mensagem"></div>
</div>

<!-- Música -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/c0FB4M8D0rM?autoplay=1&loop=1&playlist=c0FB4M8D0rM"
frameborder="0" allow="autoplay"></iframe>

<script>
/* ===== SEU JAVASCRIPT ORIGINAL ===== */

function mostrarMensagem() {
  const mensagens = [
    "Você é importante 💛",
    "Você é incrível 💕",
    "Tudo vai ficar bem 🌷"
  ];
  const msg = mensagens[Math.floor(Math.random()*mensagens.length)];
  document.getElementById("mensagem").textContent = msg;
}

function criarFogos() {
  const emojis = ['🎆','✨','🎇'];
  for (let i=0;i<20;i++){
    setTimeout(()=>{
      const f=document.createElement('div');
      f.className='firework';
      f.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      f.style.left=Math.random()*window.innerWidth+'px';
      f.style.top=Math.random()*window.innerHeight+'px';
      document.body.appendChild(f);
      setTimeout(()=>f.remove(),1000);
    },i*50);
  }
}

/* carrossel */
let currentSlide=0;
const slides=document.querySelectorAll('.carousel-slide');
const dots=document.querySelectorAll('.carousel-dot');

function showSlide(n){
  slides.forEach(s=>s.classList.remove('active'));
  dots.forEach(d=>d.classList.remove('active'));
  slides[n].classList.add('active');
  dots[n].classList.add('active');
}

function nextSlide(){currentSlide=(currentSlide+1)%slides.length;showSlide(currentSlide);}
function prevSlide(){currentSlide=(currentSlide-1+slides.length)%slides.length;showSlide(currentSlide);}
function goToSlide(n){currentSlide=n;showSlide(n);}

setInterval(nextSlide,5000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Você Não Está Sozinha 💛</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Faixa Sabrina */
    .top-banner {
      width: 100%;
      background: linear-gradient(90deg, #FFD700, #FFF3A0);
      color: #333;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 12px 0;
      text-align: center;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      letter-spacing: 1px;
    }

    .container {
      max-width: 800px;
      margin: 80px auto 0;
      position: relative;
      z-index: 1;
    }

    /* Constelação */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
    }

    .constellation-line {
      position: absolute;
      background: rgba(255, 255, 255, 0.3);
    }

    h1 {
      color: #1e5a96;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #2a7ab8;
      margin-bottom: 20px;
    }

    /* Carrossel */
    .carousel-container {
      position: relative;
      max-width: 500px;
      margin: 30px auto;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(30, 90, 150, 0.2);
      background: white;
    }

    .carousel {
      position: relative;
      width: 100%;
      padding-bottom: 100%;
    }

    .carousel-slide {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: 0.8s;
    }

    .carousel-slide.active {
      opacity: 1;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .carousel-controls {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }

    .carousel-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: white;
      opacity: 0.5;
      cursor: pointer;
    }

    .carousel-dot.active {
      opacity: 1;
      background: #2a7ab8;
    }

    .carousel-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: #2a7ab8;
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
    }

    .prev { left: 10px; }
    .next { right: 10px; }

    .frase-apoio {
      margin: 10px auto;
      padding: 15px;
      background: white;
      border-radius: 10px;
    }

    button {
      padding: 12px;
      margin: 10px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-mensagem {
      background: #2a7ab8;
      color: white;
    }

    .btn-fogos {
      background: gold;
    }

    #mensagem {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Fogos */
    .firework {
      position: fixed;
      font-size: 2rem;
      animation: explode 1s forwards;
    }

    @keyframes explode {
      to {
        transform: translate(var(--tx), var(--ty));
        opacity: 0;
      }
    }

    /* Estrelas cadentes */
    .estrela-cadente {
      position: fixed;
      font-size: 1.5rem;
      animation: cair 2s linear forwards;
    }

    @keyframes cair {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(100vh) translateX(50px); opacity: 0; }
    }
  </style>
</head>

<body>

<div class="top-banner">Sabrina ✨</div>

<div class="stars" id="constellation"></div>

<div class="container">

  <h1>Você é Mais Forte do Que Imagina 💖</h1>
  <p class="subtitle">Você não está sozinha nessa jornada</p>

  <div class="carousel-container">
    <div class="carousel">
      <div class="carousel-slide active"><img src="WhatsApp Image 1.jpeg"></div>
      <div class="carousel-slide"><img src="WhatsApp Image 2.jpeg"></div>
      <div class="carousel-slide"><img src="WhatsApp Image 3.jpeg"></div>
      <div class="carousel-slide"><img src="WhatsApp Image 4.jpeg"></div>
    </div>

    <div class="carousel-controls">
      <div class="carousel-dot active" onclick="goToSlide(0)"></div>
      <div class="carousel-dot" onclick="goToSlide(1)"></div>
      <div class="carousel-dot" onclick="goToSlide(2)"></div>
      <div class="carousel-dot" onclick="goToSlide(3)"></div>
    </div>

    <button class="carousel-nav prev" onclick="prevSlide()">❮</button>
    <button class="carousel-nav next" onclick="nextSlide()">❯</button>
  </div>

  <div class="frase-apoio">Você não está sozinha 💛</div>

  <button class="btn-mensagem" onclick="mostrarMensagem()">💌 Mensagem</button>
  <button class="btn-fogos" onclick="criarFogos()">🎆 Fogos</button>

  <div id="mensagem"></div>

</div>

<script>
const mensagens = [
  "Você é incrível 💖",
  "Tudo vai ficar bem 🌷",
  "Você é mais forte do que imagina ✨"
];

function mostrarMensagem() {
  const msg = mensagens[Math.floor(Math.random()*mensagens.length)];
  document.getElementById("mensagem").textContent = msg;
  criarEstrelasCadentes();
}

function criarEstrelasCadentes() {
  for (let i=0;i<20;i++){
    setTimeout(()=>{
      const e = document.createElement("div");
      e.textContent="🌟";
      e.className="estrela-cadente";
      e.style.left=Math.random()*window.innerWidth+"px";
      document.body.appendChild(e);
      setTimeout(()=>e.remove(),2000);
    },i*100);
  }
}

function criarFogos(){
  for(let i=0;i<20;i++){
    const f=document.createElement("div");
    f.textContent="🎆";
    f.className="firework";
    f.style.left=Math.random()*window.innerWidth+"px";
    f.style.top=Math.random()*window.innerHeight+"px";
    f.style.setProperty('--tx',(Math.random()*200-100)+'px');
    f.style.setProperty('--ty',(Math.random()*200-100)+'px');
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
  }
}

let slide=0;
const slides=document.querySelectorAll('.carousel-slide');
const dots=document.querySelectorAll('.carousel-dot');

function showSlide(n){
  slides.forEach(s=>s.classList.remove('active'));
  dots.forEach(d=>d.classList.remove('active'));
  slides[n].classList.add('active');
  dots[n].classList.add('active');
}

function nextSlide(){ slide=(slide+1)%slides.length; showSlide(slide); }
function prevSlide(){ slide=(slide-1+slides.length)%slides.length; showSlide(slide); }
function goToSlide(n){ slide=n; showSlide(slide); }

setInterval(nextSlide,5000);
</script>

</body>
</html>

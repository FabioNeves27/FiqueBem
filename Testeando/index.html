<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Você Não Está Sozinha 💛</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #ffe6f0, #fff5f9);
      padding: 20px;
    }

    h1 {
      color: #d63384;
      font-size: 24px;
    }

    p {
      font-size: 16px;
      color: #555;
      max-width: 500px;
      margin: 15px auto;
    }

    .imagens {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .imagens img {
      width: 100%;
      max-width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button {
      background-color: #ff66a3;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #e0558f;
    }

    #mensagem {
      margin-top: 20px;
      font-size: 18px;
      color: #c2185b;
      font-weight: bold;
      min-height: 50px;
      padding: 10px;
      transition: 0.3s;
    }

    /* Melhor ajuste para telas menores */
    @media (max-width: 480px) {
      h1 {
        font-size: 20px;
      }

      .imagens img {
        max-width: 100px;
        height: 100px;
      }

      button {
        width: 100%;
        max-width: 250px;
      }
    }
  </style>
</head>
<body>

  <h1>Você é Mais Forte do Que Imagina 💖</h1>

  <p>
    Mesmo nos dias difíceis, lembre-se:
    você não está sozinha.
    Ainda existem dias lindos esperando por você 🌷
  </p>

  <div class="imagens">
    <img src="WhatsApp Image 2026-02-22 at 10.54.09.jpeg" alt="Imagem 1">
    <img src="WhatsApp Image 2026-02-22 at 11.28.04.jpeg" alt="Imagem 2">
    <img src="WhatsApp Image 2026-02-25 at 18.57.39.jpeg" alt="Imagem 3">
    <img src="WhatsApp Image 2026-02-25 at 18.58.12.jpeg" alt="Imagem 4">
  </div>

  <button onclick="mostrarMensagem()">Clique para uma mensagem 💌</button>

  <div id="mensagem"></div>

  <!-- Música de fundo -->
  <iframe 
    width="0" 
    height="0" 
    src="https://www.youtube.com/embed/c0FB4M8D0rM?autoplay=1&loop=1&playlist=c0FB4M8D0rM"
    frameborder="0" 
    allow="autoplay">
  </iframe>

  <script>
    const mensagens = [
      "Você é importante. Sua presença faz diferença no mundo 💛",
      "Respira fundo... isso vai passar 🌷",
      "Mesmo quando parece difícil, você continua sendo forte 🌟",
      "Você é uma pessoa incrivel 💕",
      "Não desista. Há coisas lindas esperando por você 🌈",
      "Você não está sozinha. Sempre existe alguém que se importa 💖",
      "Você é mais forte do que imagina, mesmo quando acha que não é ✨"
    ];

    function mostrarMensagem() {
      const indice = Math.floor(Math.random() * mensagens.length);
      const mensagemDiv = document.getElementById("mensagem");
      mensagemDiv.style.opacity = 0;
      setTimeout(() => {
        mensagemDiv.textContent = mensagens[indice];
        mensagemDiv.style.opacity = 1;
      }, 200);
    }
  </script>

</body>
</html>
